# Cloudflare Tunnel Configuration - Production
# Sử dụng 1 domain duy nhất với path routing
# Upload limit: 5 files, tổng 100MB
# 
# Domain: edumentor.io.vn

tunnel: 720711cc-b3e9-41f4-bb39-865c353ea504
credentials-file: C:\Users\XC\.cloudflared\720711cc-b3e9-41f4-bb39-865c353ea504.json

# Cấu hình origin
originRequest:
  connectTimeout: 30s
  noTLSVerify: false

ingress:
  # API Backend - tất cả request /api/* đến backend
  # QUAN TRỌNG: disableChunkedEncoding=true để fix lỗi upload file qua tunnel
  - hostname: edumentor.io.vn
    path: /api/*
    service: http://localhost:5000
    originRequest:
      connectTimeout: 300s
      httpHostHeader: edumentor.io.vn
      disableChunkedEncoding: true
  
  # Audio files từ backend
  - hostname: edumentor.io.vn
    path: /audio/*
    service: http://localhost:5000
    originRequest:
      connectTimeout: 60s
  
  # Upload files - timeout cao cho files lớn (100MB)
  - hostname: edumentor.io.vn
    path: /uploads/*
    service: http://localhost:5000
    originRequest:
      connectTimeout: 300s
      disableChunkedEncoding: true

  # Frontend - tất cả request khác đến React app (production build served by backend)
  - hostname: edumentor.io.vn
    service: http://localhost:5000
  
  # www redirect
  - hostname: www.edumentor.io.vn
    service: http://localhost:5000

  # Catch-all rule (bắt buộc phải có)
  - service: http_status:404
